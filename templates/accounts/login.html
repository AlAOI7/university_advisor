{% extends 'base.html' %}

{% block title %}Login - Smart University Advisor{% endblock %} 

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">Login</h4> 
                </div>
                <div class="card-body">
                    {% if messages %}
                    <div class="alert alert-info">
                        {% for message in messages %}
                        <p class="mb-0">{{ message }}</p>
                        {% endfor %}
                    </div>
                    {% endif %}
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label> 
                            <input type="text" name="username" id="username" 
                                   class="form-control form-control-lg" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label> 
                            <input type="password" name="password" id="password" 
                                   class="form-control form-control-lg" required>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Remember me</label> 
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-sign-in-alt me-2"></i>Login 
                            </button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="mb-2">Don't have an account? 
                            <a href="{% url 'accounts:register' %}" class="text-primary fw-bold">Sign up now</a> 
                        </p>
                        <p class="mb-0">
                            <a href="{% url 'accounts:password_reset' %}" class="text-secondary">Forgot password?</a> 
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
