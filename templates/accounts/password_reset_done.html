{% extends 'base.html' %}

{% block title %}Link Sent - Smart University Guide{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-0">Link Sent</h4>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                    <h5 class="mt-4">Check Your Email</h5>
                    <p class="text-muted">
                        We have sent you a password reset link to your email.
                        <br>
                        Please check your email and follow the instructions.
                    </p>
                    
                    <div class="mt-4">
                        <a href="{% url 'login' %}" class="btn btn-primary">
                            <i class="fas fa-arrow-right me-2"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
